---
name: 🐛 Bug report
description: Create a report to help us improve
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        Before you continue filling out this report, please take a moment to check that your bug has not been [already reported on GitHub][issue search] 🙌

        **Note:** If you are seeking community support or have a general question, please consider posting on the [F5 DevCentral community forum][forum].

        Remember to redact any sensitive information such as authentication credentials, license keys, customer data, or personally identifiable information!

        [issue search]: ../search?q=is%3Aissue&type=issues
        [forum]: https://community.f5.com

  - type: textarea
    id: overview
    attributes:
      label: Bug Overview
      description: A clear and concise overview of the bug.
      placeholder: When I do "X", "Y" happens instead of "Z".
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: When I do "X", I expect "Z" to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce the Bug
      description: Detail the series of steps required to reproduce the bug.
      placeholder: When I run "X" using [...], "X" fails with "Y" error message. If I check the terminal outputs and/or logs, I see the following info.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Please provide details about your environment.
      value: |
        - Target deployment platform: [e.g. AWS/GCP/Azure/on-prem/local/etc.]
        - Target OS: [e.g. RHEL 9/Ubuntu 24.04/etc.]
        - Version of this project or specific commit: [e.g. 1.4.3/commit hash]
        - Version of any relevant project languages or runtimes: [e.g. Python 3.12/Node.js 22/etc.]
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Feel free to add any other context/information/screenshots/etc. that you think might be relevant to this issue here.